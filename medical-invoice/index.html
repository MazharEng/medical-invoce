<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Medical Store - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light" id="main-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <img src="assets/logo.svg" alt="Logo" height="32"> 
          Medical Invoice
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item"><a class="nav-link active" href="index.html">🏠 Home</a></li>
            <li class="nav-item"><a class="nav-link" href="add-medicine.html">💊 Medicines</a></li>
            <li class="nav-item"><a class="nav-link" href="invoice.html">📄 Invoices</a></li>
            <li class="nav-item"><a class="nav-link" href="#" id="clear-data">🗑️ Clear Data</a></li>
            <li class="nav-item ms-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="darkModeToggle" role="switch">
                <label class="form-check-label" for="darkModeToggle">🌙</label>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-4">
      <div class="row g-4">
        <div class="col-12">
          <h1>📊 Dashboard</h1>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">💊 Total Medicines</h5>
              <p class="card-text display-6" id="total-medicines">0</p>
              <small class="text-muted">In inventory</small>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">📄 Total Invoices</h5>
              <p class="card-text display-6" id="total-invoices">0</p>
              <small class="text-muted">All time</small>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">⚠️ Low Stock Alerts</h5>
              <ul id="low-stock-list" class="mb-0"></ul>
            </div>
          </div>
        </div>

        <div class="col-12 mt-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">📋 Recent Invoices</h5>
              <div class="table-responsive">
                <table class="table table-striped table-hover" id="recent-invoices-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Date</th>
                      <th>Total</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>

    <footer class="text-center py-3">
      <div class="container">
        <p class="mb-0">&copy; <span id="year"></span> Medical Invoice System.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/medicine.js"></script>
    <script src="js/invoice.js"></script>
  </body>
</html>
